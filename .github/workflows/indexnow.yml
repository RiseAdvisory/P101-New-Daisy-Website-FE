name: IndexNow Submit

on:
  # Auto-trigger when content merges to main
  push:
    branches: [main]
    paths:
      - 'src/lib/constants/**'
      - 'src/app/sitemap.ts'
      - 'public/llms*.txt'

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deploy to complete
        run: sleep 300

      - name: Submit URLs to IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          SITE_URL="https://www.jointhedaisy.com"
          BATCH_SIZE=100

          if [ -z "$INDEXNOW_KEY" ]; then
            echo "::error::INDEXNOW_KEY secret not configured"
            exit 1
          fi

          echo "Fetching sitemap..."
          SITEMAP=$(curl -sf "$SITE_URL/sitemap.xml")
          if [ $? -ne 0 ]; then
            echo "::error::Failed to fetch sitemap"
            exit 1
          fi

          # Extract URLs into a JSON array
          ALL_URLS=$(echo "$SITEMAP" | grep -o '<loc>[^<]*</loc>' | sed 's/<loc>//g;s/<\/loc>//g' | jq -R -s 'split("\n") | map(select(length > 0))')
          TOTAL=$(echo "$ALL_URLS" | jq 'length')
          echo "Found $TOTAL URLs"

          # Submit in batches
          BATCH=0
          OFFSET=0
          while [ "$OFFSET" -lt "$TOTAL" ]; do
            BATCH=$((BATCH + 1))
            BATCH_URLS=$(echo "$ALL_URLS" | jq ".[$OFFSET:$((OFFSET + BATCH_SIZE))]")
            BATCH_COUNT=$(echo "$BATCH_URLS" | jq 'length')

            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://api.indexnow.org/IndexNow" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "{\"host\":\"www.jointhedaisy.com\",\"key\":\"$INDEXNOW_KEY\",\"keyLocation\":\"$SITE_URL/$INDEXNOW_KEY.txt\",\"urlList\":$BATCH_URLS}")

            if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "202" ]; then
              echo "Batch $BATCH: $BATCH_COUNT URLs submitted ($RESPONSE)"
            else
              echo "::warning::Batch $BATCH failed with status $RESPONSE"
            fi

            OFFSET=$((OFFSET + BATCH_SIZE))
            # Brief pause between batches to avoid rate limits
            [ "$OFFSET" -lt "$TOTAL" ] && sleep 2
          done

          echo "Done: $TOTAL URLs submitted across $BATCH batches"
